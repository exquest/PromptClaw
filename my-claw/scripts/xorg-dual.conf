Section "ServerLayout"
    Identifier "DualHead"
    Screen 0 "Face" 0 0
    Screen 1 "Gallery" RightOf "Face"
EndSection

Section "Device"
    Identifier "GPU-Face"
    Driver "nvidia"
    BusID "PCI:1:0:0"
    Option "Monitor-DP-2" "FaceMon"
    Screen 0
EndSection

Section "Device"
    Identifier "GPU-Gallery"
    Driver "nvidia"
    BusID "PCI:1:0:0"
    Option "Monitor-DP-0" "GalleryMon"
    Screen 1
EndSection

Section "Monitor"
    Identifier "GalleryMon"
    Option "DPMS" "false"
EndSection

Section "Monitor"
    Identifier "FaceMon"
    Option "DPMS" "false"
EndSection

Section "Screen"
    Identifier "Face"
    Device "GPU-Face"
    Monitor "FaceMon"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "1280x1024"
    EndSubSection
EndSection

Section "Screen"
    Identifier "Gallery"
    Device "GPU-Gallery"
    Monitor "GalleryMon"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "3840x2160"
    EndSubSection
EndSection
