Section "ServerLayout"
    Identifier "DualHead"
    Screen 0 "Gallery" 0 0
    Screen 1 "Face" RightOf "Gallery"
EndSection

Section "Device"
    Identifier "GPU-Gallery"
    Driver "nvidia"
    BusID "PCI:1:0:0"
    Option "Monitor-DP-4" "GalleryMon"
    Screen 0
EndSection

Section "Device"
    Identifier "GPU-Face"
    Driver "nvidia"
    BusID "PCI:1:0:0"
    Option "Monitor-DP-5" "FaceMon"
    Screen 1
EndSection

Section "Monitor"
    Identifier "GalleryMon"
    Option "DPMS" "false"
EndSection

Section "Monitor"
    Identifier "FaceMon"
    Option "DPMS" "false"
EndSection

Section "Screen"
    Identifier "Gallery"
    Device "GPU-Gallery"
    Monitor "GalleryMon"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "3840x2160"
    EndSubSection
EndSection

Section "Screen"
    Identifier "Face"
    Device "GPU-Face"
    Monitor "FaceMon"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "1280x1024"
    EndSubSection
EndSection
