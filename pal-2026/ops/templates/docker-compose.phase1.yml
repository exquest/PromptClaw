version: '3.8'

networks:
  pal-net:
    driver: bridge

services:
  ollama:
    image: ollama/ollama:0.20.5
    container_name: pal-ollama
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=2
    volumes:
      - /opt/pal/ollama:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - pal-net

  router:
    build: ./router
    container_name: pal-router
    restart: unless-stopped
    environment:
      - OLLAMA_URL=http://ollama:11434
      - DEFAULT_MODEL=llama3.3:70b-instruct-q4_K_M
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    networks:
      - pal-net
