[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "promptclaw"
version = "2.1.0"
description = "An orchestrated multi-agent prompt scaffold with artifact-based handoffs."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
promptclaw = "promptclaw.cli:main"

[tool.setuptools.packages.find]
include = ["promptclaw*"]
