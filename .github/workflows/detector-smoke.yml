name: detector-branch-smoke

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  detector-branch-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          # detector smoke exercises cypherclaw audio (numpy/librosa); after the core
          # slim those live in the cypherclaw extra, so install it here.
          pip install -e '.[dev,cypherclaw]'

      - name: Detector-branch smoke test (canned WAV fixtures, <30s)
        run: |
          # Wall-clock guard: the smoke job must finish in <30s.
          timeout 30 python -m pytest \
            tests/test_sample_capture_daemon.py \
            -k "fixture or smoke" \
            -x --tb=short --durations=10
